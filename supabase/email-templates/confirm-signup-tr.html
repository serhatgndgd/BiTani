<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiTanı — E-posta doğrulama</title>
  <!-- Supabase Dashboard → Authentication → Email Templates → Confirm signup -->
  <!-- OTP: {{ .Token }} = 6 haneli kod. {{ .ConfirmationURL }} kullanılmıyor. -->
</head>
<body style="margin:0;padding:24px;background-color:#f4f4f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:480px;background-color:#ffffff;border-radius:12px;padding:32px 28px;">
          <tr>
            <td>
              <h2 style="margin:0 0 16px 0;font-size:20px;font-weight:700;color:#111;">BiTanı - E-posta Doğrulama</h2>
              <p style="margin:0 0 12px 0;font-size:15px;line-height:1.5;color:#333;">Merhaba,</p>
              <p style="margin:0 0 20px 0;font-size:15px;line-height:1.5;color:#333;">Kaydını tamamlamak için doğrulama kodun:</p>
              <h1 style="margin:0 0 24px 0;font-size:36px;letter-spacing:8px;color:#000;font-weight:700;font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;">{{ .Token }}</h1>
              <p style="margin:0 0 12px 0;font-size:14px;line-height:1.5;color:#555;">Bu kod 1 saat geçerlidir.</p>
              <p style="margin:0;font-size:14px;line-height:1.5;color:#555;">Eğer bu işlemi sen yapmadıysan bu maili görmezden gelebilirsin.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
